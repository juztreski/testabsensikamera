<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi Kamera Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            height: 100%;
            overflow: hidden;
            background-color: #f8f9fa;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: Arial, sans-serif;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="loading">Memuat Absensi Kamera...</div>
    <iframe src="https://script.google.com/macros/s/AKfycbxViXZbo7pMC3jJjJVfouk6vS99xU5nrS9MLiut-leb1Z5Yk5hmL1XXEmXpezxrvflwOQ/exec" 
            allowfullscreen 
            onload="document.querySelector('.loading').style.display='none';">
    </iframe>
</body>
</html>
